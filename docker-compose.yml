version: '3.8'

services:
  # Backend: FastAPI + ML models
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # STT backend: local_whisper (default) | local_ctc | azure
      - STT_SERVICE=${STT_SERVICE:-local_whisper}
      # Only used when STT_SERVICE=azure
      - AZURE_SPEECH_KEY=${AZURE_SPEECH_KEY:-}
      - AZURE_SERVICE_REGION=${AZURE_SERVICE_REGION:-}
      # DeepFace face-detector backend
      - EMOTION_DETECTOR_BACKEND=${EMOTION_DETECTOR_BACKEND:-opencv}
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - travistec-network

  # Frontend React
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_USE_MOCK=false
      - VITE_MOCK_API_URL=http://localhost:3001
    networks:
      - travistec-network
    depends_on:
      - backend
      - mock-server

  # Mock server for frontend-only development/testing
  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./mock-server:/app
      - /app/node_modules
    networks:
      - travistec-network
    command: npm start

  # PostgreSQL stub (placeholder for future features)
  db-stub:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=travistec
      - POSTGRES_PASSWORD=travistec123
      - POSTGRES_DB=travistec_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - travistec-network

networks:
  travistec-network:
    driver: bridge

volumes:
  db-data:
